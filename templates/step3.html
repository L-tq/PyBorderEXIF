{% extends "base.html" %}
{% block head %}
<style>
    .review-grid { display: flex; flex-wrap: wrap; gap: 24px; }
    .review-card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; width: 320px; }
    .review-card img { width: 100%; border-radius: 4px; border: 1px solid #eee; }
    .review-card .info { font-size: 0.85rem; color: #666; margin-top: 8px; }
    .progress-bar { width: 100%; height: 6px; background: #eee; border-radius: 3px; margin: 16px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: #4a90d9; border-radius: 3px; transition: width 0.3s; width: 0%; }
    .status-msg { text-align: center; color: #888; margin: 12px 0; }
    .download-btn { display: inline-block; padding: 8px 16px; background: #27ae60; color: #fff;
        border-radius: 6px; text-decoration: none; font-size: 0.85rem; cursor: pointer; }
    .download-btn:hover { background: #219a52; }
    .error-msg { color: #e74c3c; font-size: 0.85rem; }
</style>
{% endblock %}
{% block content %}
<section class="step-content">
    <h2>Step 3: Review & Download</h2>
    <p>Images will be rendered at full resolution with your configured borders, logos, and text overlays.</p>

    <div class="actions-bar">
        <button class="btn btn-secondary" onclick="window.location.href='{{ url_for("step2") }}'">← Back</button>
        <button class="btn btn-primary" id="btnRender" onclick="renderAll()">Render Images</button>
        <button class="btn btn-primary" id="btnDownloadAll" style="display:none;" onclick="downloadAll()">Download All (ZIP)</button>
    </div>

    <div class="progress-bar" id="progressBar" style="display:none;">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="status-msg" id="statusMsg"></div>

    <div class="review-grid" id="reviewGrid"></div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/step3-review.js') }}"></script>
{% endblock %}
